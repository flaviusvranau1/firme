<!DOCTYPE html><html lang="ro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site de prezentare</title>
<style>
:root{--bg:#0b1220;--card:#0e1729;--fg:#e5e7eb;--muted:#94a3b8;--line:#1e293b;--a:#60a5fa;--a2:#1e3a8a}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;overflow-x:hidden}
img{max-width:100%;display:block}[id]{scroll-margin-top:72px}
.nav{position:fixed;top:0;left:0;right:0;z-index:30;transition:.3s}
.nav.solid{background:var(--card);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.navin{max-width:1140px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:15px 22px}
.brand{font-weight:800;font-size:15px;letter-spacing:.3px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64%}
.brand .d{color:var(--a)}
.links{display:flex;gap:22px;align-items:center}
.links a{color:var(--fg);opacity:.85;text-decoration:none;font-size:14px;font-weight:600}
.links a.tel b{color:#16a34a}
.navcta{background:var(--a);color:#fff!important;opacity:1!important;padding:9px 16px;border-radius:10px;font-weight:700}
.burger{display:none;background:none;border:none;color:var(--fg);font-size:26px;cursor:pointer}
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden}
.hero video,.hero .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero video{opacity:0;transition:opacity .8s ease}
.hero .ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,12,20,.86),rgba(7,12,20,.5) 60%,rgba(7,12,20,.3));z-index:1}
.hero .in{position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:0 22px;width:100%}
.eyebrow{color:#fff;font-weight:700;letter-spacing:2px;font-size:13px;margin-bottom:18px}
.eyebrow .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--a);margin-right:8px}
.hero h1{font-size:clamp(40px,8vw,86px);font-weight:800;line-height:1;color:#fff;letter-spacing:-1px;text-transform:uppercase}
.hero h1 .l2{color:var(--a)}
.hero p.lead{max-width:520px;margin:22px 0 0;color:#e8edf3;font-size:17px}
.hbtn{margin-top:30px;display:flex;gap:14px;flex-wrap:wrap}
.hbtn a{text-decoration:none;font-weight:700;padding:15px 26px;border-radius:12px;font-size:15px}
.bp{background:var(--a);color:#fff}.bo{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5)}
.trust{background:var(--card);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.trustin{max-width:1140px;margin:0 auto;padding:20px 22px;display:flex;flex-wrap:wrap;gap:26px;justify-content:space-between}
.tb{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted)}.tb .e{font-size:20px}.tb b{color:var(--fg)}
.sec{max-width:1140px;margin:0 auto;padding:84px 22px}
.kicker{color:var(--a);font-weight:700;letter-spacing:2px;font-size:13px}
h2{font-size:clamp(28px,4vw,40px);font-weight:800;color:var(--fg);margin:8px 0 14px;text-transform:uppercase;letter-spacing:-.5px}
.intro{color:var(--muted);max-width:700px;font-size:16px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px}
.svc{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;transition:.2s}
.svc:hover{border-color:var(--a);transform:translateY(-4px)}
.svc .no{color:var(--muted);opacity:.6;font-weight:800;font-size:14px}.svc .e{font-size:30px;margin:6px 0 12px}
.svc h3{color:var(--fg);font-size:19px;margin-bottom:6px}.svc p{color:var(--muted);font-size:14.5px}
.stats{background:linear-gradient(135deg,var(--a2),var(--a));border-top:1px solid var(--line)}
.statin{max-width:1140px;margin:0 auto;padding:54px 22px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center;color:#fff}
.stat .n{font-size:42px;font-weight:800}.stat .l{opacity:.9;font-size:14px;margin-top:4px}
.band{position:relative;min-height:46vh;display:flex;align-items:center;background-size:cover;background-position:center}
.band .ov{position:absolute;inset:0;background:rgba(7,12,20,.62)}.band .in{position:relative;z-index:2;max-width:1140px;margin:0 auto;padding:40px 22px}
.band h2,.band .kicker{color:#fff}.band .intro{color:#e5e7eb}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:38px}
.step{padding:24px;background:var(--card);border:1px solid var(--line);border-radius:18px}
.step .no{font-size:34px;font-weight:800;color:var(--a);opacity:.55}.step h3{color:var(--fg);font-size:17px;margin:8px 0 5px}.step p{color:var(--muted);font-size:14px}
.gal{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:38px}
.gal img{width:100%;height:300px;object-fit:cover;border-radius:18px}
.revs{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:38px}
.rev{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px}
.rev .st{color:#f59e0b;margin-bottom:10px}.rev p{color:var(--fg);font-size:15px}
.rev .who{display:flex;align-items:center;gap:12px;margin-top:16px}
.rev .av{width:40px;height:40px;border-radius:50%;background:var(--a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
.rev .who b{color:var(--fg);display:block;font-size:14px}.rev .who span{color:var(--muted);font-size:12px}
.cta{background:linear-gradient(135deg,var(--a2),var(--a))}
.ctain{max-width:1140px;margin:0 auto;padding:74px 22px;text-align:center;color:#fff}
.cta .kicker{color:#fff;opacity:.85}.cta h2{color:#fff;font-size:clamp(28px,4vw,42px);text-transform:uppercase}.cta p{color:#fff;opacity:.92;margin-top:10px}
.cbtns{margin-top:28px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.cbtns a{text-decoration:none;font-weight:700;padding:16px 28px;border-radius:13px;font-size:16px}
.cwa{background:#16a34a;color:#fff}.cph{background:#fff;color:#111}
footer{background:var(--a2);color:#fff}
.fin{max-width:1140px;margin:0 auto;padding:50px 22px;display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:30px}
.fbrand{font-size:20px;font-weight:800;letter-spacing:.5px;margin-bottom:8px}.fbrand .d{color:var(--a)}
.ftag{color:rgba(255,255,255,.8);font-size:14px;max-width:250px;line-height:1.5}
.fin h4{color:#fff;opacity:.95;font-size:13px;letter-spacing:1px;margin-bottom:10px}.fin p,.fin a{color:rgba(255,255,255,.8);font-size:14px;text-decoration:none;display:block;margin-bottom:5px}
.fin a:hover{color:#fff}
.fcopy{border-top:1px solid rgba(255,255,255,.2);text-align:center;color:rgba(255,255,255,.72);font-size:12.5px;padding:18px}
.scta{position:fixed;left:0;right:0;bottom:0;z-index:25;display:none;gap:8px;padding:10px 12px;background:var(--card);border-top:1px solid var(--line)}
.scta a{flex:1;text-align:center;text-decoration:none;font-weight:700;padding:13px;border-radius:11px;font-size:15px}
@media(max-width:860px){.hero h1{font-size:clamp(28px,8vw,40px);letter-spacing:-.5px}.cards,.steps,.statin,.revs,.fin{grid-template-columns:1fr}.gal{grid-template-columns:1fr}
 .links{display:none;position:absolute;top:58px;left:0;right:0;background:var(--card);flex-direction:column;align-items:flex-start;padding:18px 22px;gap:16px;border-bottom:1px solid var(--line)}
 .links.open{display:flex}.navcta{width:100%;text-align:center}.burger{display:block}
 .hero .ov{background:linear-gradient(rgba(7,12,20,.55),rgba(7,12,20,.82))}.scta{display:flex}}
</style></head><body>
